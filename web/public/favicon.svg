<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- 发光滤镜 -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-amber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 渐变定义 -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#cc7700"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="64" height="64" rx="8" fill="url(#bg-grad)"/>
  
  <!-- 外边框 -->
  <rect x="2" y="2" width="60" height="60" rx="6" 
        stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- 角落装饰 -->
  <path d="M6 2 L14 2 L14 4 L6 4 Z" fill="#00d4ff" opacity="0.6"/>
  <path d="M58 2 L50 2 L50 4 L58 4 Z" fill="#00d4ff" opacity="0.6"/>
  <path d="M6 62 L14 62 L14 60 L6 60 Z" fill="#ff9500" opacity="0.6"/>
  <path d="M58 62 L50 62 L50 60 L58 60 Z" fill="#ff9500" opacity="0.6"/>
  
  <!-- 中央核心：解构的 PKG 符号 -->
  <g transform="translate(32, 32)">
    <!-- 外环 -->
    <path d="M-18 -8 L-18 -18 L-8 -18" 
          stroke="url(#cyan-grad)" stroke-width="2.5" fill="none" 
          filter="url(#glow-cyan)" stroke-linecap="round"/>
    <path d="M18 -8 L18 -18 L8 -18" 
          stroke="url(#cyan-grad)" stroke-width="2.5" fill="none" 
          filter="url(#glow-cyan)" stroke-linecap="round"/>
    <path d="M-18 8 L-18 18 L-8 18" 
          stroke="url(#amber-grad)" stroke-width="2.5" fill="none" 
          filter="url(#glow-amber)" stroke-linecap="round"/>
    <path d="M18 8 L18 18 L8 18" 
          stroke="url(#amber-grad)" stroke-width="2.5" fill="none" 
          filter="url(#glow-amber)" stroke-linecap="round"/>
    
    <!-- 中心核心 -->
    <circle cx="0" cy="0" r="6" fill="#0a0a0f" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#00d4ff" filter="url(#glow-cyan)"/>
    
    <!-- 连接线 -->
    <line x1="-12" y1="0" x2="-6" y2="0" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="0" x2="12" y2="0" stroke="#ff9500" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-12" x2="0" y2="-6" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="6" x2="0" y2="12" stroke="#ff9500" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- 底部状态点 -->
  <circle cx="20" cy="56" r="1.5" fill="#00d4ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="26" cy="56" r="1.5" fill="#00d4ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="56" r="1.5" fill="#ff9500" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="38" cy="56" r="1.5" fill="#ff9500" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="56" r="1.5" fill="#00ff88" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>